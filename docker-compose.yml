services:
  ckan-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ckan-mcp-server:latest
    container_name: ckan-mcp-server
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      # Transport mode: "http" for HTTP server, "stdio" for local pipe
      TRANSPORT: http
      PORT: 3000
      NODE_ENV: production

      # Optional: set a default CKAN portal
      # CKAN_DEFAULT_SERVER_URL: https://www.dati.gov.it/opendata

    # Resource limits (optional, adjust to your host)
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

    # Automatic log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - |
          curl -sf -X POST http://localhost:$${PORT}/mcp \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","method":"tools/list","id":1}' > /dev/null
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
